name: Validate

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npx vite build

      - name: Verify dist file exists
        run: test -f dist/card-mod-studio.js && echo "Build OK" || (echo "Build FAILED" && exit 1)

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin
          ignore: brands
