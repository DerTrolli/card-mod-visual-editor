# Threshold Colors Integration Test
# This YAML shows what Card-Mod Studio generates when using the Threshold Colors module

# Example 1: Temperature sensor with icon color thresholds
type: sensor
entity: sensor.living_room_temperature
card_mod:
  style: |
    ha-state-icon {
      color: {{ '#2196F3' if states('sensor.living_room_temperature') | float(0) < 18 else ('#4CAF50' if states('sensor.living_room_temperature') | float(0) >= 18 else '#888888') }} !important;
    }

---

# Example 2: Battery sensor with background color thresholds
type: sensor
entity: sensor.phone_battery
card_mod:
  style: |
    ha-card {
      background: {{ '#F44336' if states('sensor.phone_battery') | float(0) <= 20 else ('#FF9800' if states('sensor.phone_battery') | float(0) <= 50 else ('#4CAF50' if states('sensor.phone_battery') | float(0) > 50 else '#888888')) }};
    }

---

# Example 3: Humidity sensor with text color thresholds
type: sensor
entity: sensor.humidity
card_mod:
  style: |
    ha-card {
      color: {{ '#03A9F4' if states('sensor.humidity') | float(0) < 30 else ('#4CAF50' if states('sensor.humidity') | float(0) < 60 else ('#FF5722' if states('sensor.humidity') | float(0) >= 60 else '#888888')) }};
    }

---

# Example 4: Complex multi-rule scenario
type: entity
entity: sensor.temperature
card_mod:
  style: |
    ha-state-icon {
      color: {{ '#1565C0' if states('sensor.temperature') | float(0) < 10 else ('#2196F3' if states('sensor.temperature') | float(0) < 18 else ('#4CAF50' if states('sensor.temperature') | float(0) < 24 else ('#FF9800' if states('sensor.temperature') | float(0) < 28 else ('#F44336' if states('sensor.temperature') | float(0) >= 28 else '#888888')))) }} !important;
    }
